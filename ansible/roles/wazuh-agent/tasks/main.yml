---
- name: Ajout clé GPG Wazuh
  apt_key:
    url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    state: present

- name: Ajout repository Wazuh
  apt_repository:
    repo: deb https://packages.wazuh.com/4.x/apt/ stable main
    state: present
    filename: wazuh

- name: Installation agent Wazuh
  apt:
    name: wazuh-agent
    state: present
    update_cache: yes

- name: Configuration agent Wazuh
  lineinfile:
    path: /var/ossec/etc/ossec.conf
    regexp: '<address>MANAGER_IP</address>'
    line: '<address>10.0.50.4</address>'
  notify: restart wazuh-agent

- name: Démarrage et activation agent Wazuh
  service:
    name: wazuh-agent
    state: started
    enabled: yes
